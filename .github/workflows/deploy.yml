name: "Export and Deploy to Vercel"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  export_web:
    name: Web Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget zip unzip libfontconfig1 libdbus-1-3 libxcursor1 libxinerama1 libxrandr2 libxrender1 libxi6 libasound2t64

      - name: Download Godot 4.7-dev1
        run: |
          wget https://github.com/godotengine/godot-builds/releases/download/4.7-dev1/Godot_v4.7-dev1_linux.x86_64.zip
          unzip Godot_v4.7-dev1_linux.x86_64.zip
          mv Godot_v4.7-dev1_linux.x86_64 godot
          chmod +x godot

      - name: Download Export Templates
        run: |
          wget https://github.com/godotengine/godot-builds/releases/download/4.7-dev1/Godot_v4.7-dev1_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.7.dev1
          unzip Godot_v4.7-dev1_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.7.dev1/
          rm -rf templates Godot_v4.7-dev1_export_templates.tpz

      - name: Web Build
        run: |
          mkdir -v -p build/web
          ./godot --headless --verbose --export-release "Web" build/web/index.html

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Verify Build
        run: ls -R build/web

      - name: Deploy to Vercel
        run: |
          cp vercel.json build/web/
          cd build/web
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
